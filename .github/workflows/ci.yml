name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --ignore-scripts prevents any postinstall hooks from running
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Dummy values so Next.js build doesn't fail on missing env vars
          NEXTAUTH_SECRET: ci-placeholder
          GOOGLE_CLIENT_ID: ci-placeholder
          GOOGLE_CLIENT_SECRET: ci-placeholder
          GOOGLE_SERVICE_ACCOUNT_KEY_BASE64: ci-placeholder
          GOOGLE_SHEET_ID: ci-placeholder
          GOOGLE_CALENDAR_ID: primary
          GOOGLE_DRIVE_FOLDER_ID: ci-placeholder
          NEXTAUTH_URL: http://localhost:3000
          AUTH_URL: http://localhost:3000
          AUTH_TRUST_HOST: "true"
